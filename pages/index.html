<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoDash – Real-Time Market Tracker</title>
  <meta name="description" content="Track live cryptocurrency and stock prices with real-time charts.">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div id="header"></div>

  <main class="dashboard">
    <h1>CryptoDash</h1>
    <input type="text" id="search" placeholder="Search for Bitcoin, Ethereum..." />
    <div class="currency-box">
  <h2>USD → INR Converter</h2>

  <input 
    type="number" 
    id="usdInput" 
    placeholder="Enter USD amount"
  >

  <button id="convertBtn">
    Convert
  </button>

  <p id="inrResult">
    INR Value: ₹0
  </p>
</div>

    <div id="results"></div>

    <section class="market-widget">

  <div class="market-box">

    <h2>Top Gainers</h2>

    <div id="gainers"></div>

  </div>


  <div class="market-box">

    <h2>Top Losers</h2>

    <div id="losers"></div>

  </div>

</section>
    <section id="favorites">
      <h2>My Favorites</h2>
      <ul id="favList"></ul>
    </section>
    <canvas id="priceChart"></canvas>
  </main>

  <div id="footer"></div>
  <script src="../js/loader.js"></script>
  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
